    vendor_field: FULL_NM
    canonical_table: subscriber_profile
    canonical_field: full_name
    transformation: "TRIM(CONCAT(COALESCE(FIRST_NM, ''), ' ', COALESCE(LAST_NM, '')))"
    confidence: 0.85
