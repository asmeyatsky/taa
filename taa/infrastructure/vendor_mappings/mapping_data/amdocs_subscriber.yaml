    vendor_field: SUB_STATUS
    canonical_table: subscriber_profile
    canonical_field: status
    transformation: "CASE SUB_STATUS WHEN 'A' THEN 'active' WHEN 'S' THEN 'suspended' WHEN 'T' THEN 'terminated' WHEN 'D' THEN 'dormant' WHEN 'P' THEN 'pending' END"
    confidence: 0.90
  - vendor_table: CM_SUBSCRIBER
    vendor_field: SUB_TYPE_CD
    canonical_table: subscriber_profile
    canonical_field: subscriber_type
    transformation: "CASE SUB_TYPE_CD WHEN 'PRE' THEN 'prepaid' WHEN 'POST' THEN 'postpaid' WHEN 'HYB' THEN 'hybrid' END"
