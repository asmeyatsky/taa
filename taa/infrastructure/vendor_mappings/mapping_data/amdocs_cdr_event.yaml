    canonical_field: delivery_timestamp
    transformation: "TIMESTAMP(DELIVERY_DT)"
    confidence: 0.90
  - vendor_table: CDR_SMS
    vendor_field: MSG_TYPE_CD
    canonical_table: sms_cdr
    canonical_field: message_type
    transformation: "CASE MSG_TYPE_CD WHEN 'SM' THEN 'sms' WHEN 'MM' THEN 'mms' WHEN 'RCS' THEN 'rcs' END"
    confidence: 0.90
  - vendor_table: CDR_SMS
    vendor_field: MSG_DIR_CD
    canonical_table: sms_cdr
    canonical_field: direction
