vendor: amdocs
domain: revenue_invoice
mappings:
  # ============================================================
  # invoice mappings (from AR_INVOICE)
  # ============================================================
  - vendor_table: AR_INVOICE
    vendor_field: INV_ID
    canonical_table: invoice
    canonical_field: invoice_id
    transformation: "CAST(INV_ID AS STRING)"
    confidence: 0.99
  - vendor_table: AR_INVOICE
    vendor_field: INV_NUM
    canonical_table: invoice
    canonical_field: invoice_number
    transformation: "TRIM(INV_NUM)"
    confidence: 0.99
  - vendor_table: AR_INVOICE
    vendor_field: ACCT_ID
    canonical_table: invoice
    canonical_field: account_id
    transformation: "CAST(ACCT_ID AS STRING)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: BILL_CYCLE_CD
    canonical_table: invoice
    canonical_field: billing_cycle
    transformation: "CAST(BILL_CYCLE_CD AS INT64)"
    confidence: 0.90
  - vendor_table: AR_INVOICE
    vendor_field: BILL_PERIOD_START
    canonical_table: invoice
    canonical_field: period_start_date
    transformation: "PARSE_DATE('%Y%m%d', BILL_PERIOD_START)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: BILL_PERIOD_END
    canonical_table: invoice
    canonical_field: period_end_date
    transformation: "PARSE_DATE('%Y%m%d', BILL_PERIOD_END)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: INV_DT
    canonical_table: invoice
    canonical_field: invoice_date
    transformation: "PARSE_DATE('%Y%m%d', INV_DT)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: DUE_DT
    canonical_table: invoice
    canonical_field: due_date
    transformation: "PARSE_DATE('%Y%m%d', DUE_DT)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: TOTAL_AMT
    canonical_table: invoice
    canonical_field: total_amount
    transformation: "CAST(TOTAL_AMT AS NUMERIC)"
    confidence: 0.99
  - vendor_table: AR_INVOICE
    vendor_field: TAX_AMT
    canonical_table: invoice
    canonical_field: tax_amount
    transformation: "CAST(TAX_AMT AS NUMERIC)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: DISC_AMT
    canonical_table: invoice
    canonical_field: discount_amount
    transformation: "CAST(DISC_AMT AS NUMERIC)"
    confidence: 0.90
  - vendor_table: AR_INVOICE
    vendor_field: NET_AMT
    canonical_table: invoice
    canonical_field: net_amount
    transformation: "COALESCE(CAST(NET_AMT AS NUMERIC), CAST(TOTAL_AMT AS NUMERIC) - CAST(DISC_AMT AS NUMERIC))"
    confidence: 0.90
  - vendor_table: AR_INVOICE
    vendor_field: CURRENCY_CD
    canonical_table: invoice
    canonical_field: currency_code
    transformation: "UPPER(CURRENCY_CD)"
    confidence: 0.95
  - vendor_table: AR_INVOICE
    vendor_field: INV_STATUS
    canonical_table: invoice
    canonical_field: status
    transformation: "CASE INV_STATUS WHEN 'O' THEN 'open' WHEN 'P' THEN 'paid' WHEN 'PP' THEN 'partially_paid' WHEN 'V' THEN 'void' WHEN 'D' THEN 'disputed' WHEN 'W' THEN 'written_off' END"
    confidence: 0.90
  - vendor_table: AR_INVOICE
    vendor_field: PREV_BAL_AMT
    canonical_table: invoice
    canonical_field: previous_balance
    transformation: "CAST(PREV_BAL_AMT AS NUMERIC)"
    confidence: 0.85
  - vendor_table: AR_INVOICE
    vendor_field: INV_FORMAT_CD
    canonical_table: invoice
    canonical_field: delivery_format
    transformation: "CASE INV_FORMAT_CD WHEN 'P' THEN 'paper' WHEN 'E' THEN 'electronic' WHEN 'B' THEN 'both' END"
    confidence: 0.80

  # ============================================================
  # invoice_line_item mappings (from AR_INV_LINE)
  # ============================================================
  - vendor_table: AR_INV_LINE
    vendor_field: INV_LINE_ID
    canonical_table: invoice_line_item
    canonical_field: line_item_id
    transformation: "CAST(INV_LINE_ID AS STRING)"
    confidence: 0.99
  - vendor_table: AR_INV_LINE
    vendor_field: INV_ID
    canonical_table: invoice_line_item
    canonical_field: invoice_id
    transformation: "CAST(INV_ID AS STRING)"
    confidence: 0.99
  - vendor_table: AR_INV_LINE
    vendor_field: SUB_ID
    canonical_table: invoice_line_item
    canonical_field: subscriber_id
    transformation: "CAST(SUB_ID AS STRING)"
    confidence: 0.90
  - vendor_table: AR_INV_LINE
    vendor_field: CHARGE_TYPE_CD
    canonical_table: invoice_line_item
    canonical_field: charge_type
    transformation: "CASE CHARGE_TYPE_CD WHEN 'MRC' THEN 'monthly_recurring' WHEN 'OTC' THEN 'one_time' WHEN 'USG' THEN 'usage' WHEN 'TAX' THEN 'tax' WHEN 'ADJ' THEN 'adjustment' WHEN 'PEN' THEN 'penalty' WHEN 'PRO' THEN 'proration' END"
    confidence: 0.85
  - vendor_table: AR_INV_LINE
    vendor_field: CHARGE_DESC
    canonical_table: invoice_line_item
    canonical_field: description
    transformation: "TRIM(CHARGE_DESC)"
    confidence: 0.90
  - vendor_table: AR_INV_LINE
    vendor_field: QUANTITY
    canonical_table: invoice_line_item
    canonical_field: quantity
    transformation: "CAST(QUANTITY AS NUMERIC)"
    confidence: 0.90
  - vendor_table: AR_INV_LINE
    vendor_field: UNIT_RATE
    canonical_table: invoice_line_item
    canonical_field: unit_price
    transformation: "CAST(UNIT_RATE AS NUMERIC)"
    confidence: 0.90
  - vendor_table: AR_INV_LINE
    vendor_field: LINE_AMT
    canonical_table: invoice_line_item
    canonical_field: line_amount
    transformation: "CAST(LINE_AMT AS NUMERIC)"
    confidence: 0.95
  - vendor_table: AR_INV_LINE
    vendor_field: TAX_AMT
    canonical_table: invoice_line_item
    canonical_field: tax_amount
    transformation: "CAST(TAX_AMT AS NUMERIC)"
    confidence: 0.90
  - vendor_table: AR_INV_LINE
    vendor_field: SVC_TYPE_CD
    canonical_table: invoice_line_item
    canonical_field: service_type
    transformation: "CASE SVC_TYPE_CD WHEN 'VOI' THEN 'voice' WHEN 'DAT' THEN 'data' WHEN 'SMS' THEN 'sms' WHEN 'VAS' THEN 'value_added' WHEN 'ROA' THEN 'roaming' END"
    confidence: 0.85
  - vendor_table: AR_INV_LINE
    vendor_field: RATE_PLAN_ID
    canonical_table: invoice_line_item
    canonical_field: rate_plan_id
    transformation: "CAST(RATE_PLAN_ID AS STRING)"
    confidence: 0.85

  # ============================================================
  # payment mappings (from AR_PAYMENT)
  # ============================================================
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_ID
    canonical_table: payment
    canonical_field: payment_id
    transformation: "CAST(PAY_ID AS STRING)"
    confidence: 0.99
  - vendor_table: AR_PAYMENT
    vendor_field: ACCT_ID
    canonical_table: payment
    canonical_field: account_id
    transformation: "CAST(ACCT_ID AS STRING)"
    confidence: 0.95
  - vendor_table: AR_PAYMENT
    vendor_field: INV_ID
    canonical_table: payment
    canonical_field: invoice_id
    transformation: "CAST(INV_ID AS STRING)"
    confidence: 0.90
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_AMT
