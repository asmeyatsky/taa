    transformation: "CAST(PAY_AMT AS NUMERIC)"
    confidence: 0.99
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_DT
    canonical_table: payment
    canonical_field: payment_date
    transformation: "PARSE_DATE('%Y%m%d', PAY_DT)"
    confidence: 0.95
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_METHOD_CD
    canonical_table: payment
    canonical_field: payment_method
    transformation: "CASE PAY_METHOD_CD WHEN 'CC' THEN 'credit_card' WHEN 'DD' THEN 'direct_debit' WHEN 'CA' THEN 'cash' WHEN 'BT' THEN 'bank_transfer' WHEN 'EW' THEN 'e_wallet' WHEN 'CHK' THEN 'cheque' WHEN 'MOB' THEN 'mobile_money' END"
    confidence: 0.85
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_STATUS
    canonical_table: payment
    canonical_field: status
    transformation: "CASE PAY_STATUS WHEN 'S' THEN 'successful' WHEN 'F' THEN 'failed' WHEN 'P' THEN 'pending' WHEN 'R' THEN 'reversed' WHEN 'C' THEN 'cancelled' END"
    confidence: 0.90
  - vendor_table: AR_PAYMENT
    vendor_field: CURRENCY_CD
    canonical_table: payment
    canonical_field: currency_code
    transformation: "UPPER(CURRENCY_CD)"
    confidence: 0.95
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_REF_NUM
    canonical_table: payment
    canonical_field: reference_number
    transformation: "TRIM(PAY_REF_NUM)"
    confidence: 0.85
  - vendor_table: AR_PAYMENT
    vendor_field: PAY_CHANNEL_CD
    canonical_table: payment
    canonical_field: payment_channel
    transformation: "CASE PAY_CHANNEL_CD WHEN 'WEB' THEN 'web_portal' WHEN 'APP' THEN 'mobile_app' WHEN 'RET' THEN 'retail_store' WHEN 'AGT' THEN 'agent' WHEN 'ATM' THEN 'atm' WHEN 'IVR' THEN 'ivr' END"
    confidence: 0.80

