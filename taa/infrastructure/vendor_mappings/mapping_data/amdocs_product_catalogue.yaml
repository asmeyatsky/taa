  - vendor_table: PM_BUNDLE
    vendor_field: INCL_PROD_CNT
    canonical_table: bundle
    canonical_field: included_product_count
    transformation: "CAST(INCL_PROD_CNT AS INT64)"
    confidence: 0.85
  - vendor_table: PM_BUNDLE
    vendor_field: BUNDLE_PRICE
    canonical_table: bundle
