domain: revenue_invoice
tables:
  - name: invoice
    description: "Billing invoice header records representing consolidated bills per account per cycle, with balance tracking, delivery status, and dispute management"
    columns:
      - name: invoice_id
        type: STRING
        description: "Unique invoice identifier generated by the billing system"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier"
        nullable: false
      - name: billing_account_id
        type: STRING
        description: "Parent billing account identifier for hierarchical account structures"
        nullable: true
      - name: subscriber_id
        type: STRING
        description: "Primary subscriber identifier on the account"
        nullable: true
      - name: subscriber_count
        type: INT64
        description: "Number of active subscribers included in this invoice"
        nullable: true
      - name: bill_cycle_date
        type: DATE
        description: "Billing cycle date identifying the billing period end"
        nullable: false
      - name: invoice_date
        type: DATE
        description: "Date the invoice was generated by the bill run"
        nullable: true
      - name: due_date
        type: DATE
        description: "Payment due date calculated from invoice date plus payment terms"
        nullable: true
      - name: previous_balance
        type: NUMERIC
        description: "Outstanding balance carried forward from the previous billing cycle"
        nullable: true
      - name: payment_received
        type: NUMERIC
        description: "Total payments received and applied since the previous invoice"
        nullable: true
      - name: adjustments
        type: NUMERIC
        description: "Net adjustment amount (credits minus debits) applied in this cycle"
        nullable: true
      - name: current_charges
        type: NUMERIC
        description: "Total new charges for the current billing period"
        nullable: true
      - name: recurring_charges
        type: NUMERIC
        description: "Sum of recurring subscription and plan charges"
        nullable: true
      - name: usage_charges
        type: NUMERIC
        description: "Sum of metered usage charges (voice, data, SMS, etc.)"
        nullable: true
      - name: one_time_charges
        type: NUMERIC
        description: "Sum of one-time charges (activation fees, device charges, etc.)"
        nullable: true
      - name: total_amount
        type: NUMERIC
        description: "Total invoice amount including all charges, adjustments, and taxes"
        nullable: true
      - name: tax_rate
        type: NUMERIC
        description: "Applicable tax rate as a decimal (e.g., 0.18 for 18% VAT)"
        nullable: true
      - name: tax_amount
        type: NUMERIC
        description: "Total tax amount calculated on taxable charges"
        nullable: true
      - name: discount_amount
        type: NUMERIC
        description: "Total discount amount applied across all line items"
        nullable: true
      - name: currency
        type: STRING
        description: "ISO 4217 currency code (e.g., USD, EUR, INR)"
        nullable: true
      - name: invoice_type
        type: STRING
        description: "Invoice type: regular, adjustment, credit, interim, final"
        nullable: true
      - name: status
        type: STRING
        description: "Invoice lifecycle status: draft, open, paid, partial_paid, overdue, void, written_off"
        nullable: false
      - name: bill_run_id
        type: STRING
        description: "Identifier of the batch bill run that generated this invoice"
        nullable: true
      - name: pdf_storage_path
        type: STRING
        description: "Cloud storage path to the rendered PDF invoice (e.g., gs://bucket/invoices/...)"
        nullable: true
      - name: delivery_method
        type: STRING
        description: "Invoice delivery method: email, postal, sms_link, app_notification, self_service_portal"
        nullable: true
      - name: delivery_status
        type: STRING
        description: "Delivery status: pending, sent, delivered, bounced, returned"
        nullable: true
      - name: delivery_date
        type: DATE
        description: "Date the invoice was delivered or dispatched to the customer"
        nullable: true
      - name: dispute_flag
        type: BOOL
        description: "True if the customer has raised a dispute against this invoice"
        nullable: true

  - name: invoice_line_item
    description: "Itemized charges on an invoice with product, rate plan, usage, proration, and tax detail for full charge transparency"
    columns:
      - name: line_item_id
        type: STRING
        description: "Unique line item identifier"
        nullable: false
      - name: invoice_id
        type: STRING
        description: "Reference to the parent invoice"
        nullable: false
      - name: subscriber_id
        type: STRING
        description: "Subscriber to whom this line item charge applies"
        nullable: true
      - name: charge_type
        type: STRING
        description: "Charge type classification: recurring, usage, one_time, credit, adjustment"
        nullable: true
      - name: service_type
        type: STRING
        description: "Service type: voice, data, sms, mms, vas, device, roaming"
        nullable: true
      - name: product_id
        type: STRING
        description: "Product catalogue identifier for the charged product or service"
        nullable: true
      - name: rate_plan_id
        type: STRING
        description: "Rate plan identifier used to calculate the charge"
        nullable: true
      - name: description
        type: STRING
        description: "Human-readable line item description for the customer bill"
        nullable: true
      - name: usage_quantity
        type: FLOAT64
        description: "Consumed usage quantity (minutes, MB, messages, etc.)"
        nullable: true
      - name: unit_of_measure
        type: STRING
        description: "Unit of measure for usage quantity: minutes, seconds, MB, GB, messages, events"
        nullable: true
      - name: unit_price
        type: NUMERIC
        description: "Price per unit of measure used for charge calculation"
        nullable: true
      - name: amount
        type: NUMERIC
        description: "Net line item amount before tax"
        nullable: true
      - name: quantity
        type: INT64
        description: "Item count (e.g., number of subscriptions, devices)"
        nullable: true
      - name: from_date
        type: DATE
        description: "Charge period start date (for recurring and prorated charges)"
        nullable: true
      - name: to_date
        type: DATE
        description: "Charge period end date (for recurring and prorated charges)"
        nullable: true
      - name: tax_code
        type: STRING
        description: "Tax jurisdiction or rule code applied to this line item"
        nullable: true
      - name: tax_amount
        type: NUMERIC
        description: "Tax amount computed for this line item"
        nullable: true
      - name: discount_amount
        type: NUMERIC
        description: "Discount amount applied to this line item from promotions or bundles"
        nullable: true
      - name: proration_flag
        type: BOOL
        description: "True if this charge was prorated due to mid-cycle activation or change"
        nullable: true
      - name: bill_cycle_date
        type: DATE
        description: "Billing cycle date for partitioning and period identification"
        nullable: false

  - name: payment
    description: "Payment transaction records with multi-channel support, gateway integration, reconciliation tracking, and reversal handling"
    columns:
      - name: payment_id
        type: STRING
        description: "Unique payment transaction identifier"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier"
        nullable: false
      - name: invoice_id
        type: STRING
        description: "Reference to the invoice being paid (null for advance payments)"
        nullable: true
      - name: payment_date
        type: DATE
        description: "Date the payment was received or processed"
        nullable: false
      - name: amount
        type: NUMERIC
        description: "Payment amount in billing currency"
        nullable: true
      - name: currency
        type: STRING
        description: "ISO 4217 currency code of the payment"
        nullable: true
      - name: payment_method
        type: STRING
        description: "Payment instrument: credit_card, debit_card, bank_transfer, mobile_money, cash, cheque, voucher"
        nullable: true
      - name: payment_channel
        type: STRING
        description: "Channel through which payment was made: online, branch, agent, auto_debit, ivr, ussd, app"
        nullable: true
      - name: payment_reference
        type: STRING
        description: "External payment reference number (bank reference, cheque number, etc.)"
        nullable: true
      - name: gateway_transaction_id
        type: STRING
        description: "Payment gateway or processor transaction identifier"
        nullable: true
      - name: bank_name
        type: STRING
        description: "Payer bank name for bank transfers and direct debits"
        nullable: true
      - name: card_last_four
        type: STRING
        description: "Last four digits of the payment card (masked for PCI compliance)"
        nullable: true
      - name: receipt_number
        type: STRING
        description: "Customer-facing payment receipt number"
        nullable: true
      - name: status
        type: STRING
        description: "Payment status: pending, completed, failed, reversed, refunded"
        nullable: true
      - name: reconciliation_status
        type: STRING
        description: "Bank reconciliation status: unreconciled, matched, exception, manually_reconciled"
        nullable: true
      - name: reconciliation_date
        type: DATE
        description: "Date the payment was reconciled with bank statements"
        nullable: true
      - name: reversal_flag
        type: BOOL
        description: "True if this payment has been reversed (chargeback, bounce, etc.)"
        nullable: true
      - name: reversal_reason
        type: STRING
        description: "Reason for payment reversal: chargeback, nsf, fraud, customer_request"
        nullable: true
      - name: bill_cycle_date
        type: DATE
        description: "Associated billing cycle for reporting alignment"
        nullable: false

  - name: credit_note
    description: "Credit notes issued against invoices to correct overcharges, apply goodwill credits, or process service failure compensations"
    columns:
      - name: credit_note_id
        type: STRING
        description: "Unique credit note identifier"
        nullable: false
      - name: invoice_id
        type: STRING
        description: "Reference to the original invoice being credited"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier"
        nullable: false
      - name: credit_date
        type: DATE
        description: "Date the credit note was issued"
        nullable: false
      - name: amount
        type: NUMERIC
        description: "Credit amount before tax (positive value representing credit)"
        nullable: true
      - name: tax_amount
        type: NUMERIC
        description: "Tax reversal amount associated with the credit"
        nullable: true
      - name: reason_code
        type: STRING
        description: "Standardized reason code: billing_error, service_failure, goodwill, duplicate_charge, contract_adjustment"
        nullable: true
      - name: reason_description
        type: STRING
        description: "Free-text description of the credit reason for audit purposes"
        nullable: true
      - name: approved_by
        type: STRING
        description: "User ID or agent ID who approved the credit note"
        nullable: true
      - name: approval_date
        type: DATE
        description: "Date the credit note was approved"
        nullable: true
      - name: status
        type: STRING
        description: "Credit note status: pending_approval, approved, applied, rejected, void"
        nullable: true
      - name: bill_cycle_date
        type: DATE
        description: "Billing cycle in which the credit note will be applied"
        nullable: true
      - name: currency
        type: STRING
        description: "ISO 4217 currency code"
        nullable: true
      - name: created_at
        type: TIMESTAMP
        description: "Record creation timestamp"
        nullable: true
      - name: updated_at
        type: TIMESTAMP
        description: "Record last update timestamp"
        nullable: true

  - name: adjustment
    description: "Financial adjustments (credits and debits) applied to subscriber accounts outside the normal billing cycle for corrections, promotions, or compensations"
    columns:
      - name: adjustment_id
        type: STRING
        description: "Unique adjustment identifier"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier"
        nullable: false
      - name: subscriber_id
        type: STRING
        description: "Subscriber identifier if the adjustment targets a specific subscriber"
        nullable: true
      - name: adjustment_date
        type: DATE
        description: "Date the adjustment was applied"
        nullable: false
      - name: adjustment_type
        type: STRING
        description: "Adjustment direction: credit (reduces balance owed) or debit (increases balance owed)"
        nullable: true
      - name: amount
        type: NUMERIC
        description: "Adjustment amount in billing currency (always positive; direction indicated by adjustment_type)"
        nullable: true
      - name: tax_amount
        type: NUMERIC
        description: "Tax impact of the adjustment"
        nullable: true
      - name: reason_code
        type: STRING
        description: "Standardized reason code: billing_error, rate_plan_change, retention_credit, service_outage, promo_credit, late_fee_waiver"
        nullable: true
      - name: reason_description
        type: STRING
        description: "Free-text description of the adjustment reason"
        nullable: true
      - name: approved_by
        type: STRING
        description: "User ID or agent ID who approved the adjustment"
        nullable: true
      - name: approval_level
        type: STRING
        description: "Approval authority level: agent, supervisor, manager, finance (based on amount thresholds)"
        nullable: true
      - name: related_invoice_id
        type: STRING
        description: "Invoice ID that this adjustment relates to, if applicable"
        nullable: true
      - name: bill_cycle_date
        type: DATE
        description: "Billing cycle date in which the adjustment will appear"
        nullable: true
      - name: status
        type: STRING
        description: "Adjustment status: pending_approval, approved, applied, rejected"
        nullable: true
      - name: created_at
        type: TIMESTAMP
        description: "Record creation timestamp"
        nullable: true

  - name: dunning_action
    description: "Dunning and collections actions tracking escalating steps taken to recover overdue payments, from soft reminders to service barring and disconnection"
    columns:
      - name: action_id
        type: STRING
        description: "Unique dunning action identifier"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier of the delinquent customer"
        nullable: false
      - name: dunning_level
        type: INT64
        description: "Escalation level in the dunning process (1=reminder, 2=warning, 3=final notice, 4=barring, 5=disconnection)"
        nullable: true
      - name: action_type
        type: STRING
        description: "Type of dunning action taken: letter, sms, email, outbound_call, barring, partial_barring, disconnection"
        nullable: true
      - name: action_date
        type: DATE
        description: "Date the dunning action was executed"
        nullable: false
      - name: due_amount
        type: NUMERIC
        description: "Total overdue amount at the time of this action"
        nullable: true
      - name: overdue_days
        type: INT64
        description: "Number of days the oldest unpaid amount has been overdue"
        nullable: true
      - name: previous_action_id
        type: STRING
        description: "Reference to the previous dunning action in the escalation chain"
        nullable: true
      - name: response_received
        type: BOOL
        description: "True if the customer responded to this dunning action"
        nullable: true
      - name: response_date
        type: DATE
        description: "Date the customer response was received"
        nullable: true
      - name: status
        type: STRING
        description: "Action status: scheduled, executed, customer_responded, escalated, resolved"
        nullable: true
      - name: next_action_date
        type: DATE
        description: "Scheduled date for the next dunning action if no response"
        nullable: true
      - name: created_at
        type: TIMESTAMP
        description: "Record creation timestamp"
        nullable: true
      - name: updated_at
        type: TIMESTAMP
        description: "Record last update timestamp"
        nullable: true

  - name: revenue_recognition
    description: "Revenue recognition entries aligned with IFRS 15 for proper accounting of recurring, usage-based, one-time, and deferred revenue across accounting periods"
    columns:
      - name: recognition_id
        type: STRING
        description: "Unique revenue recognition entry identifier"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier"
        nullable: false
      - name: product_id
        type: STRING
        description: "Product catalogue identifier for the revenue-generating product"
        nullable: true
      - name: recognition_date
        type: DATE
        description: "Date on which revenue is recognized in the books"
        nullable: false
      - name: revenue_type
        type: STRING
        description: "Revenue classification: recurring, usage, one_time, deferred, contract_asset"
        nullable: true
      - name: gross_amount
        type: NUMERIC
        description: "Gross revenue amount before discounts"
        nullable: true
      - name: discount_amount
        type: NUMERIC
        description: "Discount or concession amount reducing gross revenue"
        nullable: true
      - name: net_amount
        type: NUMERIC
        description: "Net revenue amount (gross minus discounts) recognized"
        nullable: true
      - name: tax_amount
        type: NUMERIC
        description: "Tax component excluded from recognized revenue"
        nullable: true
      - name: currency
        type: STRING
        description: "ISO 4217 currency code"
        nullable: true
      - name: accounting_period
        type: STRING
        description: "Accounting period identifier (e.g., 2026-03, FY2026-Q1)"
        nullable: true
      - name: gl_account_code
        type: STRING
        description: "General Ledger account code for the revenue posting"
        nullable: true
      - name: ifrs15_category
        type: STRING
        description: "IFRS 15 performance obligation category: point_in_time, over_time, variable_consideration"
        nullable: true
      - name: created_at
        type: TIMESTAMP
        description: "Record creation timestamp"
        nullable: true

  - name: collection_case
    description: "Collection cases tracking end-to-end management of delinquent accounts from case opening through resolution or write-off, including agency assignment and promise-to-pay tracking"
    columns:
      - name: case_id
        type: STRING
        description: "Unique collection case identifier"
        nullable: false
      - name: account_id
        type: STRING
        description: "Billing account identifier of the delinquent customer"
        nullable: false
      - name: case_status
        type: STRING
        description: "Current case status: open, in_progress, escalated, resolved, written_off, agency_referred"
        nullable: true
      - name: open_date
        type: DATE
        description: "Date the collection case was opened"
        nullable: false
      - name: total_outstanding
        type: NUMERIC
        description: "Total outstanding balance at case opening"
        nullable: true
      - name: oldest_invoice_date
        type: DATE
        description: "Date of the oldest unpaid invoice in this case"
        nullable: true
      - name: last_contact_date
        type: DATE
        description: "Date of the most recent customer contact attempt"
        nullable: true
      - name: assigned_agent
        type: STRING
        description: "Internal collections agent ID assigned to the case"
        nullable: true
      - name: agency_code
        type: STRING
        description: "External debt collection agency code if the case has been referred out"
        nullable: true
      - name: promise_to_pay_date
        type: DATE
        description: "Date the customer promised to make payment"
        nullable: true
      - name: promise_amount
        type: NUMERIC
        description: "Amount the customer promised to pay"
        nullable: true
      - name: write_off_date
        type: DATE
        description: "Date the outstanding amount was written off as bad debt"
        nullable: true
      - name: write_off_amount
        type: NUMERIC
        description: "Amount written off as uncollectable bad debt"
        nullable: true
      - name: created_at
        type: TIMESTAMP
        description: "Record creation timestamp"
        nullable: true
