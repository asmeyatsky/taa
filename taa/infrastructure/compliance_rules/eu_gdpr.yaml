jurisdiction: EU
framework: GDPR
name: "European Union General Data Protection Regulation"
rules:
  - rule_id: EU-GDPR-001
    description: "Personal data processing requires lawful basis"
    applicable_pii_categories: [msisdn, imsi, imei, email, name, address, date_of_birth, ip_address, location]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 24
  - rule_id: EU-GDPR-002
    description: "Special category data requires additional safeguards"
    applicable_pii_categories: [location, ip_address]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 30
    retention_months: 12
  - rule_id: EU-GDPR-003
    description: "ePrivacy Directive requires explicit consent for processing traffic and location data in electronic communications"
    applicable_pii_categories: [msisdn, imsi, ip_address, location]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 12
  - rule_id: EU-GDPR-004
    description: "Data portability right requires structured, machine-readable export of subscriber personal data"
    applicable_pii_categories: [msisdn, email, name, address, date_of_birth]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 36
