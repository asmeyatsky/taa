jurisdiction: IE
framework: GDPR_EPRIVACY
name: "Ireland GDPR and ePrivacy Regulations"
rules:
  - rule_id: IE-GDPR-001
    description: "Personal data processing requires documented lawful basis under GDPR"
    applicable_pii_categories: [msisdn, imsi, imei, email, name, address, date_of_birth, ip_address, location]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 24
  - rule_id: IE-GDPR-002
    description: "Location data requires explicit consent under ePrivacy Directive 2002/58/EC"
    applicable_pii_categories: [location]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 30
    retention_months: 12
  - rule_id: IE-GDPR-003
    description: "CDR retention limited under Communications (Retention of Data) Act 2011"
    applicable_pii_categories: [msisdn, imsi, ip_address]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 12
  - rule_id: IE-GDPR-004
    description: "Data Protection Impact Assessment required for large-scale profiling of subscribers"
    applicable_pii_categories: [msisdn, imsi, imei, email, national_id, name, address, date_of_birth]
    data_residency_required: false
    encryption_required: true
    kms_rotation_days: 90
    retention_months: 36
