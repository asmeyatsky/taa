apiVersion: v1
kind: Secret
metadata:
  name: taa-secrets
  namespace: taa
  labels:
    app.kubernetes.io/name: taa
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Replace these values before applying
  TAA_SECRET_KEY: "CHANGE-ME-generate-a-secure-random-key"
  TAA_DATABASE_URL: "sqlite:///./taa.db"
  # Optional: Uncomment and set if using LLM features
  # ANTHROPIC_API_KEY: "sk-ant-..."
