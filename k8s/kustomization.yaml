apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taa

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

images:
  - name: taa
    newName: taa
    newTag: latest
