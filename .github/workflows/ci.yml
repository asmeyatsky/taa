name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[api,dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=taa --cov-report=term-missing

      - name: Check minimum coverage threshold
        run: |
          coverage_pct=$(pytest tests/ --cov=taa --cov-report=term 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')
          echo "Coverage: ${coverage_pct}%"
          if [ "$(echo "${coverage_pct} < 80" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${coverage_pct}% is below the 80% minimum threshold"
            exit 1
          fi
          echo "PASS: Coverage ${coverage_pct}% meets the 80% minimum threshold"

      - name: Verify imports
        run: |
          python -c "from taa.presentation.api.app import create_app; print('API OK')"
          python -c "from taa.infrastructure.mcp_servers.server import create_server; print('MCP OK')"
          python -c "from taa.presentation.api.auth import create_access_token; print('Auth OK')"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  helm-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint helm/taa/

      - name: Validate Helm template rendering
        run: helm template taa helm/taa/ --debug > /dev/null

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t taa:latest .

      - name: Smoke test container
        run: |
          docker run -d --name taa-test -p 8000:8000 taa:latest
          sleep 5
          curl -sf http://localhost:8000/api/health | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='ok', f'Bad: {d}'"
          echo "Docker smoke test passed"
          docker stop taa-test
