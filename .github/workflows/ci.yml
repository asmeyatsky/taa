name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=taa --cov-report=term-missing

      - name: Check minimum coverage threshold
        run: |
          coverage_pct=$(pytest tests/ --cov=taa --cov-report=term 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')
          echo "Coverage: ${coverage_pct}%"
          if [ "$(echo "${coverage_pct} < 80" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${coverage_pct}% is below the 80% minimum threshold"
            exit 1
          fi
          echo "PASS: Coverage ${coverage_pct}% meets the 80% minimum threshold"
